services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scoring_model_governance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scoring_model_governance"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  governance:
    image: agtipft/scoring-model-governance:testnet-latest
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/scoring_model_governance
    ports:
      - "8002:8000"
    restart: unless-stopped

volumes:
  postgres_data:
