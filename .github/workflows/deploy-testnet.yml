name: Deploy Testnet

on:
  push:
    branches: [testnet]
  workflow_dispatch:

env:
  IMAGE_NAME: agtipft/scoring-model-governance

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scoring_model_governance
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/scoring_model_governance
        run: pytest tests/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:testnet-latest
            ${{ env.IMAGE_NAME }}:testnet-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_TESTNET_HOST }}
          username: ${{ secrets.VULTR_SSH_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          source: docker-compose.testnet.yml
          target: /opt/scoring-model-governance/
          overwrite: true

      - name: Deploy to Vultr
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_TESTNET_HOST }}
          username: ${{ secrets.VULTR_SSH_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script: |
            cd /opt/scoring-model-governance
            mv docker-compose.testnet.yml docker-compose.yml

            cat > .env << 'EOF'
            DB_PASSWORD=${{ secrets.TESTNET_DB_PASSWORD }}
            ADMIN_API_KEY=${{ secrets.TESTNET_ADMIN_API_KEY }}
            EOF

            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
